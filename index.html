<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaguarete — Seguimiento del proyecto</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #f0f0ef;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b68;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.2);
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #e1f5ee;
    --green-bg: #f0fcf8;
    --amber: #BA7517;
    --amber-bg: #faeeda;
    --coral: #D85A30;
    --coral-bg: #faece7;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-tertiary: #232321;
      --text-primary: #f0efeb;
      --text-secondary: #a0a09a;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);
      --green-light: #04342c;
      --green-bg: #04342c;
      --amber-bg: #412402;
      --coral-bg: #4a1b0c;
    }
  }

  body {
    background: var(--bg-tertiary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  .header { margin-bottom: 2rem; }

  .brand {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .1em;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: .375rem;
  }

  .title {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: .25rem;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .progress-section { margin-bottom: 1.75rem; }

  .prog-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .5rem;
  }

  .prog-label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .prog-pct {
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 4px;
    transition: width .5s ease;
  }

  .phases { display: flex; flex-direction: column; gap: .75rem; }

  .phase {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }

  .phase.done { background: var(--bg-secondary); }

  .phase.active {
    border: 1.5px solid var(--green);
    background: var(--green-bg);
  }

  .phase.locked { opacity: .45; }

  .phase-top {
    display: flex;
    align-items: center;
    gap: .75rem;
  }

  .phase-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .phase-num.done { background: var(--green); color: #fff; }
  .phase-num.active { background: var(--green); color: #fff; }
  .phase-num.locked {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 0.5px solid var(--border-md);
  }

  .phase-info { flex: 1; min-width: 0; }

  .phase-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .phase-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
    line-height: 1.5;
  }

  .phase-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-done { background: var(--green-light); color: var(--green-dark); }
  .badge-active { background: var(--green); color: #fff; }
  .badge-locked { background: var(--bg-secondary); color: var(--text-secondary); }

  .phase-feedback {
    margin-top: .875rem;
    padding-top: .875rem;
    border-top: 0.5px solid var(--border);
  }

  .fb-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: .5rem;
  }

  .fb-row {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
  }

  .fb-btn {
    padding: 5px 14px;
    font-size: 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-md);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }

  .fb-btn:hover { background: var(--bg-secondary); }
  .fb-btn.sel-ok { background: var(--green); color: #fff; border-color: var(--green); }
  .fb-btn.sel-doubt { background: var(--amber); color: #fff; border-color: var(--amber); }
  .fb-btn.sel-change { background: var(--coral); color: #fff; border-color: var(--coral); }

  .fb-comment {
    width: 100%;
    margin-top: .625rem;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-md);
    background: var(--bg-secondary);
    color: var(--text-primary);
    resize: none;
    font-family: inherit;
    line-height: 1.5;
  }

  .fb-comment:focus {
    outline: none;
    border-color: var(--green);
  }

  .fb-send {
    margin-top: .5rem;
    padding: 5px 16px;
    font-size: 12px;
    border-radius: 20px;
    border: 0.5px solid var(--green);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }

  .fb-send:hover { background: var(--green); color: #fff; }

  .fb-sent {
    font-size: 12px;
    color: var(--green-dark);
    margin-top: .5rem;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 11px;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="brand">Urmalú Marketing · Diseño UX/UI</div>
    <h1 class="title">Yaguarete — Tiendanube</h1>
    <p class="subtitle">Seguimiento del proyecto en tiempo real</p>
  </header>

  <div class="progress-section">
    <div class="prog-meta">
      <span class="prog-label" id="prog-label">Cargando...</span>
      <span class="prog-pct" id="prog-pct"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="phases" id="phases-container"></div>

  <footer class="footer">
    Tu feedback se envía al formulario del proyecto y también queda guardado en este dispositivo.
  </footer>

</div>

<script>
  // locked: a realizar, active: activo, done: hecho.
const phases = [
  {
    id: 1,
    name: "Relevamiento & auditoría",
    desc: "Análisis del sitio actual, referentes y objetivos del proyecto",
    status: "active"
  },
  {
    id: 2,
    name: "Personalización CSS & layout",
    desc: "Implementación de estilos personalizados: tipografía, colores, espaciados y componentes",
    status: "locked"
  },
  {
    id: 3,
    name: "Banners & contenido gráfico",
    desc: "Diseño e implementación de banners para home y secciones principales",
    status: "locked"
  },
  {
    id: 4,
    name: "Revisión & ajustes",
    desc: "Ronda de correcciones y feedback sobre el trabajo entregado",
    status: "locked"
  },
  {
    id: 5,
    name: "Entrega final",
    desc: "Verificación, aprobación y cierre del proyecto",
    status: "locked"
  }
];

const STORAGE_KEY = "yag_feedback_v1";
let stored = {};
try { stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e) {}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stored)); } catch(e) {}
}

const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScfw2Pv-GpFv2A2Tyo_sNlFmT8YEhu-7PNWs3WAjekviGNDaA/formResponse";
const FIELD_PHASE = "entry.1567180102";
const FIELD_STATUS = "entry.1034283885";
const FIELD_COMMENT = "entry.2095794814";

function mapStatusToFormValue(status) {
  if (status === "ok") return "Ok";
  if (status === "doubt") return "Dobout";
  if (status === "change") return "Change";
  return "";
}

function render() {
  const container = document.getElementById("phases-container");
  container.innerHTML = "";

  const doneCount = phases.filter(p => p.status === "done").length;
  const activeIdx = phases.findIndex(p => p.status === "active");
  const pct = Math.round(((doneCount + (activeIdx >= 0 ? 0.4 : 0)) / phases.length) * 100);

  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-pct").textContent = pct + "%";

  const active = phases.find(p => p.status === "active");
  document.getElementById("prog-label").textContent = active
    ? "Fase " + (activeIdx + 1) + " de " + phases.length + " en curso"
    : "Proyecto completado";

  phases.forEach(function(p) {
    const fb = stored[p.id] || {};
    const canFeedback = p.status !== "locked";
    const div = document.createElement("div");
    div.className = "phase " + p.status;

    const icon = p.status === "done" ? "✓" : p.id;
    const badgeLabels = { done: "Completado", active: "En curso", locked: "Pendiente" };

    let fbHtml = "";
    if (canFeedback) {
      const sel = fb.reaction || "";
      fbHtml = '<div class="phase-feedback">'
        + '<div class="fb-label">Tu opinión sobre esta etapa:</div>'
        + '<div class="fb-row">'
        + '<button class="fb-btn' + (sel === "ok" ? " sel-ok" : "") + '" data-phase="' + p.id + '" data-val="ok">Aprobado</button>'
        + '<button class="fb-btn' + (sel === "doubt" ? " sel-doubt" : "") + '" data-phase="' + p.id + '" data-val="doubt">Tengo dudas</button>'
        + '<button class="fb-btn' + (sel === "change" ? " sel-change" : "") + '" data-phase="' + p.id + '" data-val="change">Quiero cambios</button>'
        + '</div>';

      if (sel) {
        fbHtml += '<textarea class="fb-comment" id="comment-' + p.id + '" placeholder="Comentario opcional..." rows="2">' + (fb.comment || "") + '</textarea>'
          + '<button class="fb-send" data-phase="' + p.id + '">' + (fb.sent ? "Actualizar comentario" : "Enviar comentario") + '</button>';
        if (fb.sent) {
          fbHtml += '<div class="fb-sent">✓ Enviado — gracias por tu feedback</div>';
        }
      }
      fbHtml += '</div>';
    }

    div.innerHTML = '<div class="phase-top">'
      + '<div class="phase-num ' + p.status + '">' + icon + '</div>'
      + '<div class="phase-info">'
      + '<div class="phase-name">' + p.name + '</div>'
      + '<div class="phase-desc">' + p.desc + '</div>'
      + '</div>'
      + '<span class="phase-badge badge-' + p.status + '">' + badgeLabels[p.status] + '</span>'
      + '</div>'
      + fbHtml;

    container.appendChild(div);
  });

  container.querySelectorAll(".fb-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      const id = parseInt(btn.dataset.phase);
      const val = btn.dataset.val;
      stored[id] = stored[id] || {};
      stored[id].reaction = val;
      stored[id].sent = false;
      save();
      render();
    });
  });

container.querySelectorAll(".fb-send").forEach(function(btn) {
  btn.addEventListener("click", function() {
    const id = parseInt(btn.dataset.phase);
    const textarea = document.getElementById("comment-" + id);
    const phase = phases.find(p => p.id === id);

    stored[id] = stored[id] || {};
    if (textarea) stored[id].comment = textarea.value;

    const formData = new FormData();
    formData.append(FIELD_PHASE, phase ? phase.name : "");
    formData.append(FIELD_STATUS, mapStatusToFormValue(stored[id].reaction || ""));
    formData.append(FIELD_COMMENT, stored[id].comment || "");

    try {
      fetch(FORM_URL, {
        method: "POST",
        mode: "no-cors",
        body: formData
      });
      stored[id].sent = true;
      save();
      render();
    } catch (e) {
      alert("Error enviando feedback. Intentá de nuevo.");
    }
  });
});
}

render();
</script>
</body>
</html>
